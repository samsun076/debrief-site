<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Debrief</title>
  <meta name="description" content="Debrief — a reflection tool, not a recording tool.">
  <style>
    :root {
      color-scheme: light;
      --ink: #1a1d21;
      --muted: #6b7280;
      --tint: #f6f7f9;
    }
    * { margin: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--tint);
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    main { text-align: center; max-width: 34rem; }
    h1 {
      font-size: 1.5rem;
      font-weight: 650;
      letter-spacing: -0.01em;
    }
    h1 span { color: var(--muted); font-weight: 400; }
    p {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 1.0625rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>debrief<span>.run</span></h1>
    <p>A reflection tool, not a recording tool.<br>Soon.</p>
  </main>
</body>
</html>
